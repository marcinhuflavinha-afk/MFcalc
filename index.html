<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF CALC - Dashboard 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-slate-900 text-white p-4 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter">MF <span class="text-blue-400">CALC</span></h1>
            <div class="text-sm opacity-75"><i class="fas fa-print mr-2"></i>Bambu Lab A1 Online</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Total em Orçamentos</p>
                <p id="dashTotal" class="text-2xl font-black text-slate-800">R$ 0,00</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Peças Cadastradas</p>
                <p id="dashItens" class="text-2xl font-black text-slate-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-purple-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Custo de Energia (kWh)</p>
                <p class="text-2xl font-black text-slate-800">R$ 0,65</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-6 flex items-center">
                    <i class="fas fa-calculator mr-2 text-blue-500"></i> Novo Orçamento
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">Nome da Peça/Cliente</label>
                        <input type="text" id="nomePeca" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: Action Figure Batman">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600">Peso (gramas)</label>
                            <input type="number" id="peso" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600">Tempo (horas)</label>
                            <input type="number" id="tempo" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="0">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600">Filamento (R$/kg)</label>
                            <input type="number" id="precoFilamento" value="90" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600">Lucro (%)</label>
                            <input type="number" id="lucro" value="100" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                    </div>

                    <button onclick="gerarOrcamento()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                        GERAR E SALVAR
                    </button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-6 flex items-center">
                    <i class="fas fa-list mr-2 text-blue-500"></i> Peças Salvas
                </h2>
                
                <div class="overflow-x-auto h-[400px]">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-400 text-xs uppercase border-b">
                                <th class="pb-3">Peça</th>
                                <th class="pb-3 text-right">Preço</th>
                                <th class="pb-3 text-right">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="listaPecas" class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('mf_calc_data')) || [];

        function atualizarUI() {
            const lista = document.getElementById('listaPecas');
            lista.innerHTML = '';
            let totalGeral = 0;

            db.forEach((item, index) => {
                totalGeral += item.valor;
                lista.innerHTML += `
                    <tr>
                        <td class="py-4 font-medium text-slate-700">${item.nome}</td>
                        <td class="py-4 text-right font-bold text-blue-600 text-base">R$ ${item.valor.toFixed(2)}</td>
                        <td class="py-4 text-right">
                            <button onclick="deletarItem(${index})" class="text-red-400 hover:text-red-600 px-2"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('dashTotal').innerText = `R$ ${totalGeral.toFixed(2)}`;
            document.getElementById('dashItens').innerText = db.length;
            localStorage.setItem('mf_calc_data', JSON.stringify(db));
        }

        function gerarOrcamento() {
            const nome = document.getElementById('nomePeca').value || "Peça sem nome";
            const peso = parseFloat(document.getElementById('peso').value);
            const tempo = parseFloat(document.getElementById('tempo').value);
            const precoKg = parseFloat(document.getElementById('precoFilamento').value);
            const margem = parseFloat(document.getElementById('lucro').value) / 100;

            if(!peso || !tempo) return alert("Preencha peso e tempo!");

            // CÁLCULO BASEADO NA BAMBU LAB A1
            const custoKwh = 0.65;
            const consumoW = 180; // Média Bambu A1
            const custoEnergia = (consumoW / 1000) * tempo * custoKwh;
            const custoMaterial = (peso / 1000) * precoKg;
            
            // Adição de depreciação básica (R$ 0,80 por hora de uso)
            const depreciacao = tempo * 0.80;

            const custoTotal = custoMaterial + custoEnergia + depreciacao;
            const precoFinal = custoTotal * (1 + margem);

            db.push({ nome, valor: precoFinal });
            atualizarUI();
            
            // Limpa campos
            document.getElementById('nomePeca').value = '';
            document.getElementById('peso').value = '';
            document.getElementById('tempo').value = '';
        }

        function deletarItem(index) {
            db.splice(index, 1);
            atualizarUI();
        }

        // Inicia a tela
        atualizarUI();
    </script>
</body>
</html>
